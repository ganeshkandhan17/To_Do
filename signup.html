<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="loginsignup.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <h1 class="title">Signup</h1>
        <input class="name" name="name" type="text" placeholder="Enter Name" required>
        <input class="email" name="email" type="email" placeholder="Enter Mail ID" required>
        <input class="password" name="password" type="Password" placeholder="Enter Password" required>
        <input class="confirmpassword" name="confirmpassword" type="Password" placeholder="Re-Enter Password" required>
        <button><b>Signup</b></button>
        <div>
            <p class="link">If already have account <a class="switch" href="index.html"> Login</a></p>
        </div>
    </div>
    <script src="loginscript.js"></script>
</body>
</html>
